<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- External font stylesheets from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- External css link -->
    <link rel="stylesheet" href="../src/styles/style.css">
    <title>Fancy Hats</title>
</head>
<body>
    <!-- Header of the page -->
    <header class="header">
        <div class="menu-container">
            <i class="fa-solid fa-bars menu-icon"></i>
            <div class="menu-options-container">
                <div class="hat-image-container">
                    <img src="../src/assets/images/hat-icon.svg" alt="Hat image" class="hat-image">
                </div>
                <!-- List of hat options -->
                <ul class="hat-options-list">
                    <li class="hat-options-list-item">COWBOY HATS</li>
                    <li class="hat-options-list-item">DAD HATS</li>
                    <li class="hat-options-list-item">FEDORAS</li>
                    <li class="hat-options-list-item">TRIBAL HATS</li>
                    <li class="hat-options-list-item">FLAT CAPS</li>
                    <li class="hat-options-list-item">DERBY HATS</li>
                    <li class="hat-options-list-item">ARMY CAPS</li>
                    <li class="hat-options-list-item">CLOCHE HATS</li>
                    <li class="hat-options-list-item">BEANIES</li>
                    <li class="hat-options-list-item">TRAPPER HATS</li>
                    <li class="hat-options-list-item">SNAPBACKS</li>
                    <li class="hat-options-list-item">TRUCKER HATS</li>
                    <li class="hat-options-list-item">VISORS</li>
                </ul>
            </div>
        </div>
        <h1 class="header-title">FANCY HATS</h1>
        <p class="header-title-additional-info">SINCE <span class="additional-info-bigger-text">1867</span></p>
    </header>

    <!-- Main section -->
    <main class="main">
        <p class="slogan-text">
            <span class="slogan-smaller-text">HATS FOR A </span>
            <span class="slogan-bigger-text">LIFETIME</span>
        </p>
    </main>

    <!-- Footer of the page -->
    <footer class="footer">
        <i class="fa-brands fa-twitter social-icon social-icon-twitter"></i>
        <i class="fa-brands fa-facebook social-icon social-icon-facebook"></i>
    </footer>

    <!-- Wrapper for overlay effect -->
    <div class="overlay"></div>
    <!-- Fontawesome script for icons -->
    <script src="https://kit.fontawesome.com/1d71c5906f.js" crossorigin="anonymous"></script>
</body>
</html>
