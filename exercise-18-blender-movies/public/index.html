<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- External stylesheets from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- External stylesheets -->
    <link rel="stylesheet" href="../src/styles/style.css">
    <title>Blender Movies</title>
</head>

<body>
    <!-- Header section beginning -->
    <header class="header padding-x-xl">
        <h1 class="header-title fw-600">Blender Movies</h1>
        <!-- Profile container -->
        <div class="header-profile-container">
            <p class="header-profile-name">Steff jerry</p>
            <div class="profile-image-container">
                <img src="../src/assets/images/user/profile-image.png" alt="Profile Image" class="profile-image">
            </div>
        </div>
    </header>
    <!-- Header section ending -->

    <!-- Main section beginning -->
    <main class="main padding-x-xl">
        <!-- Movie details container -->
        <div class="movie-container">
            <video class="movie-video" controls poster="../src/assets/images/video/thumbnail.png" id="video">
                Your browser doesn't support this video
            </video>

            <section class="movie-info-container">
                <h2 class="movie-title" id="movie-title"></h2>
                <p class="movie-description fw-300" id="movie-description"></p>
            </section>

            <hr class="divider-line" />

            <h2 class="comments-header fw-650" id="comments">Comments</h2>
            <ul class="comments-section-list" id="comments-section-list">
                <!-- Individual comments -->
            </ul>
        </div>

        <hr class="divider-line" />

        <!-- Movie list container -->
        <div class="movie-list-container">
            <h2 class="movie-list-header fw-650">Upcoming Projects</h2>
            <div class="movie-list-container" id="movie-list-container">
                <!-- Movie list item -->
            </div>
        </div>

        <!-- Chat icon -->
        <div class="chat-container">
            <i class="fa-solid fa-comments chat-icon"></i>
        </div>
    </main>
    <!-- Main section ending -->

    <!-- Footer section beginning -->
    <footer class="footer padding-x-xl">
        <p class="copyrights-text">&copy; Copyrights <span id="year-text"></span></p>
        <p class="footer-text fw-600">Blender Movies</p>
    </footer>
    <!-- Footer section ending -->

    <!-- Font awesome icon script -->
    <script src="https://kit.fontawesome.com/1d71c5906f.js" crossorigin="anonymous"></script>
    <!-- Jquery script -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <!-- External scripts -->
    <script type="module" src="../src/scripts/index.js"></script>
</body>

</html>
