<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fontawesome external stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- External stylesheet -->
     <link rel="stylesheet" href="../src/styles/styles.css">
    <title>Math Kids</title>
</head>
<body>
    <header class="header">
        <p class="header-app-name">MATH KIDS</p>
        <p class="header-app-info">KIDS LEARNING APP</p>
    </header>
    
    <main class="main">
        <!-- Shapes section beginning -->
        <section class="shapes">
            <h2 class="section-info-text">1. Choose a Shape</h2>
            <div class="shapes-list-container">
                <div class="shapes-list-item shapes-circle" id="circle">
                    <div class="tick-mark-circle"></div>
                </div>
                <div class="shapes-list-item shapes-triangle" id="triangle">
                    <div class="tick-mark-triangle"></div>
                </div>
                <div class="shapes-list-item shapes-square" id="square">
                    <div class="tick-mark-square"></div>
                </div>
            </div>
            <button class="section-button" id="shapes-section-button">
                <p class="section-button-text">NEXT</p>
            </button>
        </section>
        <!-- Shapes section ending -->
    
        <!-- Shapes value input  beginning -->
        <section class="shape-value">
            <h2 class="section-info-text">2. <span id="value-prompt-text"></span></h2>
            <input type="number" name="dimension" id="dimension-input" class="shape-value-input">
            <button class="section-button" id="dimension-section-button">
                <p class="section-button-text">CALCULATE</p>
            </button>
        </section>
        <!-- Shapes value input section ending -->
    
        <!-- Calculation result section beginning -->
        <section class="shape-calculation-results">
            <div id="shape-container">
            </div>
            <div class="spacer"></div>
            <h2 class="section-info-text" id="shape-name"></h2>
            <!-- Result containers to display -->
            <div class="result-container-wrapper">
                <div class="result-container">
                    <div class="result-heading">
                        <p class="result-text" id="dimension-text"></p>
                    </div>
                    <div class="result-formula">
                        <p class="result-text" id="dimension-symbol"></p>
                    </div>
                    <div class="result-value">
                        <p class="result-text" id="dimension-value"></p>
                    </div>
                </div>
    
                <div class="result-container">
                    <div class="result-heading">
                        <p class="result-text">AREA</p>
                    </div>
                    <div class="result-formula">
                        <p class="result-text" id="area-formula-text"></p>
                    </div>
                    <div class="result-value">
                        <p class="result-text" id="area-value"></p>
                    </div>
                </div>
    
                <div class="result-container">
                    <div class="result-heading">
                        <p class="result-text">PERIMETER</p>
                    </div>
                    <div class="result-formula">
                        <p class="result-text" id="perimeter-formula-text"></p>
                    </div>
                    <div class="result-value">
                        <p class="result-text" id="perimeter-value"></p>
                    </div>
                </div>
            </div>
            <button class="section-button" id="result-section-button">
                <p class="section-button-text">START AGAIN</p>
            </button>
        </section>
        <!-- Calculation result section ending -->
    </main>
    <!-- External JS scripts -->
    <script src="../src/scripts/index.js"></script>
</body>
</html>
