<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- External Font style sheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- External style sheet -->
    <link rel="stylesheet" href="../src/styles/style.css">
    <title>Portfolio</title>
</head>
<body>
    <!-- Header section of the page -->
    <header class="header">
        <p class="email">shruthi.bhatt@siriuscom.com</p>
    </header>

    <!-- Main section -->
    <main class="main">
        <section class="profile_info">
            <h2 class="profile_info-name">Shruthi <b>Bhatt</b></h2>
            <p class="profile_info-tech">a <span class="highlight-blue">product</span> designer</p>
        </section>

        <!-- Product card container -->
        <div class="product-list">
            <!-- Product cards -->
            <img src="../src/assets/images/products/rawpixel-769308-unsplash.png" alt="Nike Photo" class="product-list-item">
            <img src="../src/assets/images/products/fancycrave-329196-unsplash.png" alt="Graphic Design Now" class="product-list-item">
            <img src="../src/assets/images/products/nadine-shaabana-1112616-unsplash.png" alt="Coffee bean image" class="product-list-item">
            <img src="../src/assets/images/products/fikri-rasyid-689579-unsplash.png" alt="Mouse on shirt" class="product-list-item">
            <img src="../src/assets/images/products/marc-mueller-654355-unsplash.png" alt="Oculus webpage in phone" class="product-list-item">
            <img src="../src/assets/images/products/jeff-sheldon-3219-unsplash.png" alt="Apple speaker" class="product-list-item">
        </div>

        <!-- Logos -->
        <section class="logos-section">
            <h3 class="logos-section-header">Big names to <span class="highlight-green">show off</span></h3>
            <div class="logos-section-list">
                <img src="../src/assets/images/logos/logo_1.png" alt="Spotify" class="logos-section-list-item">
                <img src="../src/assets/images/logos/logo_3.png" alt="Audi" class="logos-section-list-item">
                <img src="../src/assets/images/logos/logo_18.png" alt="Adidas" class="logos-section-list-item">
                <img src="../src/assets/images/logos/logo_7.png" alt="Lufthansa" class="logos-section-list-item">
                <img src="../src/assets/images/logos/logo_11.png" alt="IKEA" class="logos-section-list-item">
                <img src="../src/assets/images/logos/logo_2.png" alt="Mont Blanc" class="logos-section-list-item">
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-social-list">

        </div>

        <p class="footer-text">Coded with Love & Passion</p>
    </footer>
</body>
</html>
