<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- External Font style sheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- External style sheet -->
    <link rel="stylesheet" href="../src/styles/style.css">
    <title>Portfolio</title>
</head>
<body>
    <!-- Main section -->
    <main class="main">
        <section class="profile-info">
            <p class="email-desktop">shruthi.bhatt@siriuscom.com</p>
            <h1 class="profile-info-name"><span class="shrink">Shruthi</span> <span class="extra-bold">Bhatt</span></h1>
            <p class="profile-info-tech">a <span class="highlight-blue">product</span> designer</p>
            <p class="email-mobile">shruthi.bhatt@siriuscom.com</p>
        </section>

        <!-- Product card container -->
        <div class="product-list">
            <!-- Product cards -->
            <div class="product-list-item-container">
                <img src="../src/assets/images/products/rawpixel-769308-unsplash.png" alt="Nike Photo" class="product-list-item">
            </div>

            <div class="product-list-item-container">
                <img src="../src/assets/images/products/fancycrave-329196-unsplash.png" alt="Graphic Design Now" class="product-list-item">
            </div>

            <div class="product-list-item-container">
                <img src="../src/assets/images/products/nadine-shaabana-1112616-unsplash.png" alt="Coffee bean image" class="product-list-item">
            </div>

            <div class="product-list-item-container">
                <img src="../src/assets/images/products/fikri-rasyid-689579-unsplash.png" alt="Mouse on shirt" class="product-list-item">
            </div>

            <div class="product-list-item-container">
                <img src="../src/assets/images/products/marc-mueller-654355-unsplash.png" alt="Oculus webpage in phone" class="product-list-item">
            </div>
            
            <div class="product-list-item-container">
                <img src="../src/assets/images/products/jeff-sheldon-3219-unsplash.png" alt="Apple speaker" class="product-list-item">
            </div>
        </div>

        <!-- Logos -->
        <section class="logos-section">
            <h3 class="logos-section-header">Big names to <span class="highlight-green">show off</span></h3>
            <div class="logos-section-list">
                <div class="logos-section-list-spotify-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_1.png" alt="Spotify" class="logos-section-list-image">
                </div>

                <div class="logos-section-list-audi-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_3.png" alt="Audi" class="logos-section-list-image">
                </div>

                <div class="logos-section-list-adidas-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_18.png" alt="Adidas" class="logos-section-list-image">
                </div>

                <div class="logos-section-list-lufthansa-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_7.png" alt="Lufthansa" class="logos-section-list-image">
                </div>

                <div class="logos-section-list-ikea-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_11.png" alt="IKEA" class="logos-section-list-image">
                </div>

                <div class="logos-section-list-montblanc-image-container logos-section-list-container">
                    <img src="../src/assets/images/logos/logo_2.png" alt="Mont Blanc" class="logos-section-list-image">
                </div>
            </div>
        </section>
    </main>

    <!-- Separator line between main and footer -->
    <div class="header-footer-divider-container">
        <div class="header-footer-divider-small"></div>
        <div class="header-footer-divider-large"></div>
    </div>

    <!-- Footer of the page -->
    <footer class="footer">
        <!-- List of social icons -->
        <div class="footer-social-list">
            <div class="footer-social-icon-container">
                <i class="fa-brands fa-facebook-f footer-social-icon"></i>
            </div>

            <div class="footer-social-icon-container">
                <i class="fa-brands fa-twitter footer-social-icon"></i>
            </div>

            <div class="footer-social-icon-container">
                <i class="fa-brands fa-instagram footer-social-icon"></i>
            </div>

            <div class="footer-social-icon-container">
                <i class="fa-brands fa-dribbble footer-social-icon"></i>
            </div>

            <div class="footer-social-icon-container">
                <!-- Added a different medium icon since the intended icon is unavailable -->
                <i class="fa-brands fa-medium footer-social-icon"></i>
            </div>
        </div>

        <p class="footer-text">Coded with Love & Passion</p>
    </footer>
    <!-- Font awesome script -->
    <script src="https://kit.fontawesome.com/1d71c5906f.js" crossorigin="anonymous"></script>
</body>
</html>
